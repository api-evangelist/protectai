meters:
- name: self_hosted_compute_hours
  description: Compute hours running the self-hosted LLM Guard API and ModelScan (your infra cost, not a Protect AI charge).
  unit: hours
  aggregation: sum
  dimensions:
  - account
  - deployment
- name: commercial_subscription
  description: Contracted subscription for Guardian / Recon / Layer; charged per agreement, not publicly metered.
  unit: contract
  aggregation: sum
  dimensions:
  - account
  - product
principles:
- name: Visibility
  description: Attribute self-hosted LLM Guard cost to its host infrastructure tags; track commercial subscription line items from the Protect AI / Palo Alto Networks invoice.
- name: Allocation
  description: Tag LLM Guard deployments per workload/team; map commercial seats and products to internal cost centers.
- name: Optimization
  description: Prefer self-hosted open-source LLM Guard where it meets requirements; right-size scanner sets and worker counts to cut compute; scope commercial products to genuine coverage gaps.
- name: Accountability
  description: Assign owners per deployment and per commercial product; review infra and subscription spend against budget.
