description: >-
  FinOps view of Protect AI spend. Cost falls into two distinct shapes. The
  open-source LLM Guard and ModelScan carry no license or per-call fee; their
  cost is entirely the self-hosted infrastructure (compute, GPU, storage,
  operations) you run them on. The commercial platform (Guardian, Recon, Layer,
  now via Palo Alto Networks Prisma AIRS) is a sales-led subscription whose
  charges are governed by contract and are not publicly metered. Specific
  commercial rates are not reconciled here.
notes: >-
  Track open-source LLM Guard cost as infrastructure spend in your existing
  cloud FinOps practice. Treat commercial Protect AI / Prisma AIRS charges as
  contracted subscription spend; verify meters against your agreement on
  reconciliation.
